<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Subjects</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {font-family: Arial; max-width: 700px; margin: auto; padding: 15px; background: #f5f5f5;}
h2 {background: #17a2b8; color: white; padding: 12px; text-align: center; border-radius: 5px;}
.box {background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
select {width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;}
label {font-weight: bold; margin-top: 10px; display: block; color: #333;}
table {width: 100%; border-collapse: collapse; margin-top: 15px;}
th {background: #17a2b8; color: white; padding: 10px; text-align: left;}
td {padding: 10px; border-bottom: 1px solid #ddd;}
.no-data {text-align: center; color: #999; padding: 20px; font-style: italic;}
.error {color: red; font-weight: bold; margin-top: 10px;}
</style>
</head>
<body>

<h2>Class Subjects</h2>

<div class="box">
<label>Select Class:</label>
<select id="classSelect">
<option value="">Loading classes...</option>
</select>

<div id="subjectBox" style="display:none;">
<h3>Subjects for <span id="className"></span></h3>
<table id="subjectTable">
<thead>
<tr>
<th>S/N</th>
<th>Subject Name</th>
</tr>
</thead>
<tbody id="subjectList"></tbody>
</table>
<p id="noSubject" class="no-data" style="display:none;">No subjects assigned to this class</p>
</div>

<div id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://epgegesdptpaegycughz.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwZ2VnZXNkcHRwYWVneWN1Z2h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mjk4NzcsImV4cCI6MjA5NzMwNTg3N30.9eK3TvMP5Ve_ZMQlGV12aSpT84CMxDUJTk_fnHCSBfQ'
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

window.onload = loadClasses;

// Load all classes
async function loadClasses() {
    const sel = document.getElementById('classSelect');
    sel.innerHTML = '<option value="">Loading classes...</option>';

    const {data, error} = await supabaseClient.from('classes').select('*').order('name');

    if(error) {
        sel.innerHTML = '<option value="">Error loading classes</option>';
        showMsg('Error: ' + error.message, 'error');
        return;
    }

    sel.innerHTML = '<option value="">-- Choose Class --</option>';
    data.forEach(c => {
        sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
    });
}

// Load subjects when class selected
document.getElementById('classSelect').onchange = async function() {
    const className = this.value;
    const subjectBox = document.getElementById('subjectBox');

    if(!className) {
        subjectBox.style.display = 'none';
        return;
    }

    document.getElementById('className').textContent = className;
    subjectBox.style.display = 'block';

    const tbody = document.getElementById('subjectList');
    const noSubject = document.getElementById('noSubject');
    tbody.innerHTML = '<tr><td colspan="2">Loading subjects...</td></tr>';
    noSubject.style.display = 'none';

    // Key fix: use subjects(name) because your column is 'name' not 'subject_name'
    const {data, error} = await supabaseClient
      .from('class_subjects')
      .select('subjects(name)')
      .eq('class_name', className);

    if(error) {
        tbody.innerHTML = '<tr><td colspan="2" style="color:red;">Error loading subjects</td></tr>';
        showMsg('Error: ' + error.message, 'error');
        return;
    }

    if(!data || data.length === 0) {
        tbody.innerHTML = '';
        noSubject.style.display = 'block';
        return;
    }

    tbody.innerHTML = '';
    data.forEach((row, i) => {
        let subName = row.subjects?.name || 'No name';
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${subName}</td></tr>`;
    });
}

function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.innerHTML = `<p class="${type}">${text}</p>`;
    setTimeout(() => el.innerHTML = '', 4000);
}
</script>
</body>
</html>
